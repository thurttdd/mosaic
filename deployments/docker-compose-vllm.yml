services:
  mosaic-vllm:
    build:
      context: .
      dockerfile: ../profiler/Dockerfile
    image: openmosaic/mosaic-vllm:1.0.1
    container_name: mosaic-vllm
    ports:
      - "8080:8080"
    environment:
      - NCCL_PROFILER_OTEL_TELEMETRY_ENDPOINT=http://172.17.0.1:4318
      - VLLM_LOGGING_LEVEL=DEBUG
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    # Required for multi-GPU NCCL communication
    ipc: host
    command: ["vllm serve Qwen/Qwen3-8B --port 8080 --tensor-parallel-size 2 --gpu-memory-utilization 0.8 --disable-custom-all-reduce --enforce-eager"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # 5 minutes for model download and loading
    stop_grace_period: 30s
    restart: unless-stopped
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
