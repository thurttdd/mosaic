# Grafana Dashboard Provisioning Configuration
# This file configures Grafana to automatically load NCCL Profiler dashboards

apiVersion: 1

providers:
  - name: "Mosaic"
    type: file
    orgId: 1
    folder: "Mosaic"
    options:
      path: /var/lib/grafana/dashboards/mosaic.json
      foldersFromFilesStructure: false
  - name: "NCCL Profiler - Comprehensive"
    type: file
    orgId: 1
    folder: "Mosaic"
    options:
      path: /var/lib/grafana/dashboards/nccl_profiler_comprehensive.json
      foldersFromFilesStructure: false
  - name: "NCCL Profiler - Troubleshooting"
    type: file
    orgId: 1
    folder: "Mosaic"
    options:
      path: /var/lib/grafana/dashboards/nccl_troubleshooting.json
      foldersFromFilesStructure: false
  - name: "Overall Status"
    type: file
    orgId: 1
    folder: "Experimental"
    options:
      path: /var/lib/grafana/dashboards/amd_overall_status.json
      foldersFromFilesStructure: false
  - name: "System Details - AMD"
    type: file
    orgId: 1
    folder: "Experimental"
    options:
      path: /var/lib/grafana/dashboards/system_details_amd.json
      foldersFromFilesStructure: false
  - name: "System Details - NVIDIA"
    type: file
    orgId: 1
    folder: "Mosaic"
    options:
      path: /var/lib/grafana/dashboards/system_details_nvidia.json
      foldersFromFilesStructure: false
  - name: "Node Exporter - Overall Status"
    type: file
    orgId: 1
    folder: "Node Exporter"
    options:
      path: /var/lib/grafana/dashboards/node_exporter_full.json
      foldersFromFilesStructure: false
  - name: "Node Exporter - InfiniBand"
    type: file
    orgId: 1
    folder: "Node Exporter"
    options:
      path: /var/lib/grafana/dashboards/node_exporter_infiniband.json
      foldersFromFilesStructure: false
  - name: "vLLM - Disaggregated Inference"
    type: file
    orgId: 1
    folder: "Mosaic"
    options:
      path: /var/lib/grafana/dashboards/disaggregated.json
      foldersFromFilesStructure: false
