site_name: Open Mosaic
site_url: https://openmosaic.ai/

theme:
  name: material
  font:
    text: Google Sans
    code: Google Sans Mono
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - content.code.copy
    - content.footnote.tooltips
    - navigation.sections
    - navigation.expand
extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike

plugins:
  - search
  - spellcheck:
      ignore_code: yes
      known_words: dictionary.txt
      skip_files:
        - coc.md # We adopt common Code of Conduct and use it as is

markdown_extensions:
  # admonition
  - admonition
  - pymdownx.details
  - pymdownx.superfences

  # code highlight
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # definition list and task list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

  # content tabs
  - pymdownx.tabbed:
      alternate_style: true

  # table of contents
  - toc:
      permalink: "#"
      baselevel: 2
      separator: "-"

  # image loading
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

  # footnote
  - footnotes

  # text formatting
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Getting Started:
    - Overview: index.md
    - Quick Start: quickstart.md
  - Concepts:
    - Architecture: architecture.md
    - Profiler Design: design.md
  - Development:
    - Build & Install: build.md
    - Troubleshooting: troubleshoot.md
  - Validation:
    - Validation: validation.md
    - Test Suites: testsuite.md
    - Release: release.md
  - Community:
    - How to Contribute: contribution.md
    - Governance: governance.md
    - Code of Conduct: coc.md
