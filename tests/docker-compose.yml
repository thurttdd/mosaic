#
# Include the OTEL stack (Prometheus, Grafana, OTEL Collector)
# MOSAIC_PATH should be path to the mosaic repo
include:
  - ../deployments/docker-compose.yml
  - ../deployments/docker-compose-vllm.yml

services:

  production-test-framework:
    profiles: ["test"]
    image: openmosaic/production-test-framework:latest
    container_name: production-test-framework
    environment:
      - MOSAIC_PATH=${MOSAIC_PATH}
      - RUN_MAKE_TARGET=run-tests
      - PYTEST_ARGS="--junitxml=/app/results/test_results.xml"
      - TEST_MARKER="profiler_otel or dashboards"
    network_mode: "host"
    volumes:
      - ./suites:/app/tests:ro
      - ../deployments/dashboards:/mnt/dashboards:ro
      - test-results:/app/results
    depends_on:
      mosaic-vllm:
        condition: service_started
    
      otel-lgtm:
          condition: service_healthy
    restart: "no"

volumes:
  test-results:
    driver: local
