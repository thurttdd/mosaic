name: Integration Tests

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: [self-hosted, gpu-integration]
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run integration tests
        run: echo "HOME=$HOME" >> $GITHUB_ENV && make cleanup && make test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ env.HOME }}/tmp/mosaic/test_results.xml
          retention-days: 7

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v2.5.0
        with:
          name: Integration Test Results
          artifact: integration-test-results
          path: "**/test_results.xml"
          reporter: java-junit
