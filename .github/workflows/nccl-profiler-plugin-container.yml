name: NCCL Profiler Plugin Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:
  workflow_call:
    inputs:
      force_build:
        description: 'When true, always run build (e.g. when called from release workflow)'
        required: false
        type: boolean
        default: false

jobs:
  check-paths:
    name: Check paths
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      nccl-profiler-container: ${{ steps.paths.outputs.nccl-profiler-container }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            nccl-profiler-container:
              - 'profiler/**/*.cc'
              - 'profiler/**/*.h'
              - 'profiler/**/*.hpp'
              - 'profiler/**/*.c'
              - 'profiler/**/CMakeLists.txt'
              - 'profiler/Dockerfile'
              - '.github/workflows/nccl-profiler-plugin-container.yml'
              - '.github/trivy.yaml'

  build-container:
    name: Build and Scan Profiler Plugin Container
    needs: check-paths
    if: inputs.force_build == true || github.event_name == 'workflow_dispatch' || needs.check-paths.outputs.nccl-profiler-container == 'true'
    runs-on: ubuntu-latest-m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: profiler
          # Push the image to the registry if the branch is main or a tag is pushed.
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          # Load image to local Docker so Trivy can scan it when not pushing.
          load: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ vars.DOCKERHUB_REPO || 'local' }}/mosaic-vllm:${{ steps.short-sha.outputs.sha }}
            ${{ (github.ref == 'refs/heads/main' && format('{0}/mosaic-vllm:latest', vars.DOCKERHUB_REPO || 'local')) || '' }}
            ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/mosaic-vllm:{1}', vars.DOCKERHUB_REPO || 'local', github.ref_name)) || '' }}
          build-args: |
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha
          # Only push cache on main to avoid filling GHA cache on PRs/other branches
          cache-to: ${{ github.ref == 'refs/heads/main' && 'type=gha,mode=max' || '' }}

      - name: Run Trivy vulnerability scanner
        if: (github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch') || !contains(github.event.pull_request.labels.*.name, 'skip-trivy')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_REPO || 'local' }}/mosaic-vllm:${{ steps.short-sha.outputs.sha }}
          trivy-config: .github/trivy.yaml
          trivyignores: .github/.trivyignore
